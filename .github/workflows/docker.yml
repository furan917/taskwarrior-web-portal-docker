name: Docker

# Rebuilds and pushes the image when:
#   - a commit lands on main
#   - weekly on Monday at 03:00 UTC — picks up new taskwarrior-web-portal
#     releases even when no code changes have landed in this repo
#   - triggered manually via workflow_dispatch
#
# Multi-arch: linux/amd64 + linux/arm64 in a single manifest via QEMU + Buildx.
# ARM64 is emulated; Rust compilation over QEMU can take 40+ minutes, hence the
# generous timeout. The tw-builder layer is cached by GHA so subsequent builds
# only re-run if TASK_VERSION or its deps change.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve latest taskwarrior-web-portal release
        id: twp
        run: |
          tag=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/furan917/taskwarrior-web-portal/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "::error::Could not resolve latest taskwarrior-web-portal release"
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved TWP version: $tag"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: TWP_VERSION=${{ steps.twp.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
