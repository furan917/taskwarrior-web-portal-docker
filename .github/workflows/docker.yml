name: Docker

# Rebuilds and pushes the image when:
#   - a commit lands on main
#   - weekly on Monday at 03:00 UTC — picks up new taskwarrior-web-portal
#     releases even when no code changes have landed in this repo
#   - triggered manually via workflow_dispatch
#
# Multi-arch: linux/amd64 + linux/arm64 built in parallel via a matrix, then
# merged into a single manifest. Each platform gets its own job so ARM64 QEMU
# compilation doesn't block amd64.

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - .github/workflows/docker.yml
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Resolve latest taskwarrior-web-portal release
        id: twp
        run: |
          tag=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/furan917/taskwarrior-web-portal/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "::error::Could not resolve latest taskwarrior-web-portal release"
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved TWP version: $tag"

      - name: Sanitise platform name for artifact
        run: echo "platform_pair=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: TWP_VERSION=${{ steps.twp.outputs.version }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ env.platform_pair }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
